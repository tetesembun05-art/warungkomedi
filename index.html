<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Komedi - 4 Sekawan AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #4e342e; 
      background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
      font-family: 'Segoe UI', sans-serif; padding: 15px; color: #3e2723;
    }
    .container {
      max-width: 550px; margin: 0 auto; background: #efebe9;
      border: 8px solid #3e2723; border-radius: 20px; padding: 25px;
      box-shadow: 15px 15px 0px rgba(0,0,0,0.4);
    }
    h1 { text-align: center; font-size: 30px; text-shadow: 2px 2px #d7ccc8; margin-bottom: 5px; }
    .subtitle { text-align: center; font-size: 13px; margin-bottom: 20px; color: #5d4037; font-weight: bold; }

    .token-box { background: #d7ccc8; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 2px dashed #5d4037; }
    input[type="password"] { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: 2px solid #5d4037; outline: none; }

    .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 5px 5px 0px #bcaaa4; }
    .btn { 
      width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px;
      cursor: pointer; transition: 0.2s; color: white; background: #6d4c41; border-bottom: 6px solid #3e2723;
    }
    .btn:active { transform: translateY(4px); border-bottom: 2px solid #3e2723; }
    .btn-video { background: #d84315; border-bottom: 6px solid #bf360c; margin-top: 15px; }

    h4 { color: #d84315; margin-bottom: 15px; text-align: center; background: #fff3e0; padding: 10px; border-radius: 8px; }
    .chat-container { display: flex; flex-direction: column; gap: 15px; }
    .chat { display: flex; gap: 12px; align-items: flex-start; background: #fdf5e6; padding: 12px; border-radius: 12px; border-left: 6px solid #6d4c41; }
    .avatar { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #6d4c41; object-fit: cover; background: #eee; flex-shrink: 0; }
    .msg { font-size: 14px; line-height: 1.5; }
    .name { font-weight: bold; display: block; color: #d84315; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; }

    #videoArea { margin-top: 20px; text-align: center; border-top: 2px solid #d7ccc8; padding-top: 15px; }
    video { width: 100%; border-radius: 15px; border: 5px solid #3e2723; background: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .vid-desc { font-size: 12px; margin-top: 8px; color: #5d4037; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h1>☕ WARUNG KOMEDI</h1>
  <p class="subtitle">"Skenario 4 Sekawan & AI Video Generator"</p>

  <div class="token-box">
    <label>🔑 <strong>API Token Hugging Face:</strong></label>
    <input type="password" id="hfToken" placeholder="Paste hf_... di sini">
  </div>

  <button class="btn" onclick="generateFullSkenario()">🎯 Buat Cerita 4 Tokoh</button>

  <div id="hasilSkenario" style="display:none; margin-top: 20px;">
    <div class="card">
      <div id="scriptContent" class="chat-container"></div>
      
      <div id="videoArea">
        <p style="font-size: 13px; margin-bottom: 10px;"><b>Render Video Reaksi Tokoh Utama:</b></p>
        <button class="btn btn-video" id="btnVid" onclick="renderAIVideo()">🎬 Render Video Gerak (6s Loop)</button>
        <div id="videoContainer"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const repoBase = "https://raw.githubusercontent.com/tetesembun05-art/warungkomedi/main/";
  
  const images = {
    'bang_jali': repoBase + 'Bang%20Jali.jpg',
    'mang_udin': repoBase + 'Mang%20Udin%20(2).jpg',
    'asep': repoBase + 'Asep.jpg',
    'bang_dul': repoBase + 'Bang%20Dul.jpg' 
  };

  const skenarioDatabase = [
    {
      judul: "Kopi Hitam & Hutang Melilit",
      cerita: [
        { s: 'mang_udin', t: "Bang Dul, kopi satu... gulanya dikit aja, semanis janji palsu bos saya." },
        { s: 'bang_dul', t: "Banyak gaya lu Din! Bayar dulu hutang minggu kemaren, baru gue bikinin kopi!" },
        { s: 'bang_jali', t: "Aelah Dul, duit receh segitu diributin. Nih liat, dompet gue sampe gak bisa nutup gara-gara penuh kartu!" },
        { s: 'asep', t: "Dompet yang tidak bisa ditutup adalah metafora dari keserakahan yang tak berujung, Bang Jali." }
      ]
    },
    {
      judul: "Sultan KW vs Filosofi Kopi",
      cerita: [
        { s: 'bang_jali', t: "Baru beli jam tangan nih, katanya bisa deteksi kebohongan. Keren kan?" },
        { s: 'asep', t: "Jam itu akan meledak kalau ditaruh di tangan Abang, karena hidup Abang penuh kepalsuan." },
        { s: 'mang_udin', t: "Jam abang bisa deteksi kebohongan, jam saya cuma bisa deteksi waktu makan siang yang gak pasti..." },
        { s: 'bang_dul', t: "Berisik lu pada! Jam berapa pun itu, tetep aja hutang lu belum lunas!" }
      ]
    },
    {
      judul: "Mimpi Jadi Orang Kaya",
      cerita: [
        { s: 'mang_udin', t: "Kalo saya jadi kaya, saya mau beli warung ini biar Bang Dul yang saya tagih hutang." },
        { s: 'bang_dul', t: "Mimpi lu ketinggian! Bangun Din, gorengan lu udah dingin tuh!" },
        { s: 'bang_jali', t: "Nih contoh gue, penampilan harus nomor satu. Dompet kosong urusan belakangan!" },
        { s: 'asep', t: "Kekayaan adalah beban bagi jiwa yang merdeka, namun beban itu yang abang cari." }
      ]
    }
  ];

  let mainChar = '';

  function generateFullSkenario() {
    const random = skenarioDatabase[Math.floor(Math.random() * skenarioDatabase.length)];
    const display = document.getElementById('scriptContent');
    
    // Pilih tokoh pertama sebagai bintang video
    mainChar = random.cerita[0].s;

    let html = `<h4>🎬 ${random.judul}</h4>`;
    random.cerita.forEach(c => {
      html += `
        <div class="chat">
          <img src="${images[c.s]}" class="avatar" onerror="this.src='https://via.placeholder.com/60'">
          <div class="msg">
            <span class="name">${c.s.replace('_',' ')}</span>
            "${c.t}"
          </div>
        </div>
      `;
    });

    display.innerHTML = html;
    document.getElementById('hasilSkenario').style.display = 'block';
    document.getElementById('videoContainer').innerHTML = '';
  }

  async function renderAIVideo() {
    const token = document.getElementById('hfToken').value;
    if(!token) return alert("Masukkan TOKEN dulu bosku!");

    const btn = document.getElementById('btnVid');
    btn.innerText = "⏳ AI Merender Reaksi " + mainChar + "...";
    btn.disabled = true;

    try {
      const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-video-diffusion-img2vid-xt", {
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        method: "POST",
        body: JSON.stringify({ 
          inputs: images[mainChar],
          parameters: { fps: 14, motion_bucket_id: 127 }
        }),
      });

      if (!response.ok) throw new Error("Gagal! Cek Token atau Server Sibuk.");

      const blob = await response.blob();
      const vidUrl = URL.createObjectURL(blob);
      
      document.getElementById('videoContainer').innerHTML = `
        <video controls autoplay loop><source src="${vidUrl}"></video>
        <p class="vid-desc">✅ Video ${mainChar.replace('_',' ')} Selesai! (Looping Aktif)</p>
      `;
    } catch (e) {
      alert("Waduh: " + e.message);
    } finally {
      btn.innerText = "🎬 Render Video Gerak (6s Loop)";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
