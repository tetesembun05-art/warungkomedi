<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Komedi - AI Skenario & Video</title>
  <style>
    /* STYLE KHAS WARUNG KOPI */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #4e342e; 
      background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px; color: #3e2723;
    }
    .container {
      max-width: 500px; margin: 0 auto; background: #efebe9;
      border: 8px solid #3e2723; border-radius: 15px; padding: 20px;
      box-shadow: 12px 12px 0px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; font-size: 28px; text-shadow: 1px 1px #d7ccc8; margin-bottom: 5px; }
    .subtitle { text-align: center; font-size: 12px; margin-bottom: 20px; font-style: italic; color: #5d4037; }

    /* TOKEN BOX */
    .token-box { background: #d7ccc8; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px dashed #5d4037; }
    input[type="password"] { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 2px solid #5d4037; }

    /* CARD CERITA */
    .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 4px 4px 0px #bcaaa4; }
    .btn { 
      width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px;
      cursor: pointer; transition: 0.2s; color: white; background: #6d4c41; border-bottom: 5px solid #3e2723;
    }
    .btn:active { transform: translateY(3px); border-bottom: 2px solid #3e2723; }
    .btn-video { background: #d84315; border-bottom: 5px solid #bf360c; margin-top: 15px; }

    /* DIALOG BOX */
    h4 { color: #d84315; margin-bottom: 15px; border-bottom: 2px solid #d7ccc8; padding-bottom: 5px; }
    .chat { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-start; background: #fdf5e6; padding: 10px; border-radius: 8px; }
    .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #6d4c41; object-fit: cover; background: #eee; flex-shrink: 0; }
    .msg { font-size: 13px; line-height: 1.4; }
    .name { font-weight: bold; display: block; color: #5d4037; font-size: 11px; margin-bottom: 2px; text-transform: uppercase; }

    video { width: 100%; border-radius: 10px; margin-top: 15px; border: 4px solid #3e2723; background: #000; }
  </style>
</head>
<body>

<div class="container">
  <h1>☕ Warung Komedi</h1>
  <p class="subtitle">"Generate 1000 Script & Video AI"</p>

  <div class="token-box">
    <label>🔑 <strong>Hugging Face Token:</strong></label>
    <input type="password" id="hfToken" placeholder="Paste hf_... di sini">
  </div>

  <button class="btn" onclick="generateSkenario()">🎯 Buat Skenario Acak</button>

  <div id="hasilArea" style="display:none; margin-top: 20px;">
    <div class="card">
      <div id="scriptDisplay"></div>
      <button class="btn btn-video" id="btnVid" onclick="renderVideoAI()">🎬 Render Video Reaksi (AI)</button>
      <div id="videoContainer"></div>
    </div>
  </div>
</div>

<script>
  // LINK GAMBAR DARI REPO: warungkomedi
  const repoBase = "https://raw.githubusercontent.com/tetesembun05-art/warungkomedi/main/";
  const charImages = {
    'bang_jali': repoBase + 'Bang%20Jali.jpg',
    'mang_udin': repoBase + 'Mang%20Udin%20(2).jpg',
    'asep': repoBase + 'Asep.jpg',
    'bang_dul': repoBase + 'Mang%20Udin.jpg' // Sementara pake foto udin kalo belom ada Bang Dul
  };

  // BANK SKENARIO (BISA DITAMBAH TERUS)
  const databaseSkenario = [
    {
      judul: "HP Lipat vs Dompet Lipat",
      dialog: [
        { s: 'bang_jali', t: "Din, liat nih! HP gue bisa dilipet tiga, canggih kan?" },
        { s: 'mang_udin', t: "HP abang dilipet tiga, dompet saya malah udah kempes bang..." },
        { s: 'asep', t: "Lipatan itu hanyalah simbol dari dimensi yang terhimpit ekonomi." }
      ]
    },
    {
      judul: "Kopi Hitam Pahit",
      dialog: [
        { s: 'mang_udin', t: "Bang Dul, kopi satu. Paitin ya, samain kayak masa depan saya." },
        { s: 'bang_dul', t: "Kopi pait mah gampang, yang susah tuh lu bayar utang!" },
        { s: 'bang_jali', t: "Halah, kopi pait aja diributin. Nih liat jam gue, anti air mata!" }
      ]
    },
    {
      judul: "Gaya Sultan KW",
      dialog: [
        { s: 'bang_jali', t: "Mobil baru gue suaranya halus bener, sampe gak kedengeran!" },
        { s: 'mang_udin', t: "Itu mah mobil mogok kali bang..." },
        { s: 'asep', t: "Keheningan adalah puncak dari kebisingan yang tertunda." }
      ]
    }
  ];

  let currentMainCharacter = '';

  function generateSkenario() {
    const randomIdx = Math.floor(Math.random() * databaseSkenario.length);
    const skenario = databaseSkenario[randomIdx];
    const display = document.getElementById('scriptDisplay');
    
    // Karakter pertama di percakapan bakal jadi model Video
    currentMainCharacter = skenario.dialog[0].s;

    let html = `<h4>🎬 Judul: ${skenario.judul}</h4>`;
    skenario.dialog.forEach(chat => {
      html += `
        <div class="chat">
          <img src="${charImages[chat.s]}" class="avatar" onerror="this.src='https://via.placeholder.com/50'">
          <div class="msg">
            <span class="name">${chat.s.replace('_',' ')}</span>
            "${chat.t}"
          </div>
        </div>
      `;
    });

    display.innerHTML = html;
    document.getElementById('hasilArea').style.display = 'block';
    document.getElementById('videoContainer').innerHTML = '';
  }

  async function renderVideoAI() {
    const token = document.getElementById('hfToken').value;
    if(!token) return alert("Masukkan Token Hugging Face dulu bos!");

    const btn = document.getElementById('btnVid');
    btn.innerText = "⏳ AI Lagi Rendis (30-60 detik)...";
    btn.disabled = true;

    try {
      const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-video-diffusion-img2vid-xt", {
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        method: "POST",
        body: JSON.stringify({ 
          inputs: charImages[currentMainCharacter],
          parameters: { fps: 14, motion_bucket_id: 127 }
        }),
      });

      if (!response.ok) throw new Error("Gagal! Cek Token atau Model lagi sibuk.");

      const blob = await response.blob();
      const vidUrl = URL.createObjectURL(blob);
      document.getElementById('videoContainer').innerHTML = `
        <video controls autoplay loop><source src="${vidUrl}"></video>
        <p style="text-align:center; font-size:12px; color:green; margin-top:5px;">✅ Video ${currentMainCharacter} Selesai!</p>
      `;
    } catch (e) {
      alert("Error: " + e.message);
    } finally {
      btn.innerText = "🎬 Render Video Reaksi (AI)";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
